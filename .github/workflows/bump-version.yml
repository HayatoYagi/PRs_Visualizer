name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        ref: ${{ github.event.repository.default_branch }}
      
    - name: Read current version
      id: current_version
      run: |
        VERSION=$(grep "^version=" version.properties | cut -d'=' -f2)
        echo "CURRENT_VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"
    
    - name: Bump version
      id: bump_version
      run: |
        CURRENT_VERSION="${{ steps.current_version.outputs.CURRENT_VERSION }}"
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        case "${{ github.event.inputs.version_type }}" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_BRANCH=release/v${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"

    - name: Create release branch
      run: |
        BASE_BRANCH="${{ github.event.repository.default_branch }}"
        RELEASE_BRANCH="${{ steps.bump_version.outputs.RELEASE_BRANCH }}"

        git fetch origin "$BASE_BRANCH"
        git checkout -B "$BASE_BRANCH" "origin/$BASE_BRANCH"

        if git ls-remote --heads origin "$RELEASE_BRANCH" | grep -q "$RELEASE_BRANCH"; then
          echo "Release branch already exists: $RELEASE_BRANCH"
          exit 1
        fi

        git checkout -b "$RELEASE_BRANCH"
    
    - name: Update version.properties
      run: |
        NEW_VERSION="${{ steps.bump_version.outputs.NEW_VERSION }}"
        sed -i "s/^version=.*/version=${NEW_VERSION}/" version.properties
        cat version.properties
    
    - name: Commit version bump
      run: |
        NEW_VERSION="${{ steps.bump_version.outputs.NEW_VERSION }}"
        RELEASE_BRANCH="${{ steps.bump_version.outputs.RELEASE_BRANCH }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.properties
        git commit -m "Bump version to ${NEW_VERSION}"
        git push -u origin "$RELEASE_BRANCH"

    - name: Create release PR
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        NEW_VERSION="${{ steps.bump_version.outputs.NEW_VERSION }}"
        RELEASE_BRANCH="${{ steps.bump_version.outputs.RELEASE_BRANCH }}"
        BASE_BRANCH="${{ github.event.repository.default_branch }}"

        gh pr create \
          --base "$BASE_BRANCH" \
          --head "$RELEASE_BRANCH" \
          --title "Release v${NEW_VERSION}" \
          --body "Automated release PR for v${NEW_VERSION}."
