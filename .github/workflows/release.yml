name: Release

on:
  push:
    branches: [ main, master ]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: '*.deb'
            asset_name_suffix: '.deb'
          - os: macos-latest
            artifact_name: '*.dmg'
            asset_name_suffix: '.dmg'
          - os: windows-latest
            artifact_name: '*.msi'
            asset_name_suffix: '.msi'
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Read version
      id: version
      shell: bash
      run: |
        VERSION=$(grep "^version=" version.properties | cut -d'=' -f2)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"
    
    - name: Build distribution for ${{ matrix.os }}
      run: ./gradlew :composeApp:packageReleaseDistributionForCurrentOS --stacktrace
      
    - name: Find artifact
      id: find_artifact
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          ARTIFACT=$(find composeApp/build/compose/binaries/main-release/deb -name "*.deb" | head -n 1)
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          ARTIFACT=$(find composeApp/build/compose/binaries/main-release/dmg -name "*.dmg" | head -n 1)
        else
          ARTIFACT=$(find composeApp/build/compose/binaries/main-release/msi -name "*.msi" | head -n 1)
        fi
        echo "ARTIFACT_PATH=$ARTIFACT" >> $GITHUB_OUTPUT
        echo "Found artifact: $ARTIFACT"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.os }}-${{ steps.version.outputs.VERSION }}
        path: ${{ steps.find_artifact.outputs.ARTIFACT_PATH }}
  
  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Read version
      id: version
      run: |
        VERSION=$(grep "^version=" version.properties | cut -d'=' -f2)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Current version: $VERSION"
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        TAG="v${VERSION}"
        
        # Check if tag already exists
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skipping release creation"
          exit 0
        fi
        
        # Create release with artifacts
        gh release create "$TAG" \
          --title "Release $VERSION" \
          --notes "Automated release for version $VERSION" \
          artifacts/**/*
